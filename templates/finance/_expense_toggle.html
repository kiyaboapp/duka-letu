{% load humanize %}
<form method="post" action="{% url 'finance:expense_toggle' item.pk %}" class="inline">
    {% csrf_token %}
    <button type="submit" class="px-3 py-2 text-sm font-medium border rounded-md
        {% if item.is_active %}text-red-600 border-red-200 hover:bg-red-50{% else %}text-green-600 border-green-200 hover:bg-green-50{% endif %}">
        {% if item.is_active %}Deactivate{% else %}Activate{% endif %}
    </button>
</form>
