{% load humanize %}
<div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4" id="purchase-form-panel">
    <h3 class="text-sm font-semibold text-green-800 mb-3">Record Purchase: {{ spec.product.name }}</h3>
    <form method="post" action="{% url 'inventory:purchase_create' %}" class="flex flex-wrap items-end gap-3">
        {% csrf_token %}
        <input type="hidden" name="product_spec" value="{{ spec.pk }}">
        {% for field in form %}
        {% if field.name != 'product_spec' %}
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endif %}
        {% endfor %}
        <div class="flex gap-2">
            <button type="submit" class="px-3 py-1.5 bg-green-600 text-white text-sm font-medium rounded-md hover:bg-green-700">Record Purchase</button>
            <button type="button" onclick="document.getElementById('purchase-form-panel').remove()"
                    class="px-3 py-1.5 bg-white text-gray-600 text-sm font-medium border border-gray-300 rounded-md hover:bg-gray-50">Cancel</button>
        </div>
    </form>
</div>
