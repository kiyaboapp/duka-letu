{% load humanize %}
<form method="post" action="{% url 'credit:debtor_block' debtor.pk %}" class="inline">
    {% csrf_token %}
    <button type="submit" class="px-3 py-2 text-sm font-medium border rounded-md
        {% if debtor.is_blocked %}text-green-600 border-green-200 hover:bg-green-50{% else %}text-red-600 border-red-200 hover:bg-red-50{% endif %}">
        {% if debtor.is_blocked %}Unblock{% else %}Block{% endif %}
    </button>
</form>
