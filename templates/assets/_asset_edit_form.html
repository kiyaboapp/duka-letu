{% load humanize %}
<div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
    <h3 class="text-sm font-semibold text-blue-800 mb-3">Edit Asset</h3>
    <form hx-post="{% url 'assets:asset_update' asset.pk %}"
          hx-target="#asset-action-area"
          hx-swap="innerHTML"
          class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div class="sm:col-span-2 flex gap-2 mt-2">
            <button type="submit" class="px-3 py-1.5 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">Save</button>
            <button type="button" onclick="document.getElementById('asset-action-area').innerHTML=''"
                    class="px-3 py-1.5 bg-white text-gray-600 text-sm font-medium border border-gray-300 rounded-md hover:bg-gray-50">Cancel</button>
        </div>
    </form>
</div>
